<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵伴</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{margin:0;overflow:hidden;background:transparent}
        #canvas{display:block}
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

// 从localStorage读取猫咪名字
let catName=localStorage.getItem('catName')||'小黑';

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// 猫咪
const cat={
    x:canvas.width/2,
    y:canvas.height*0.6,
    vx:0,vy:0,
    faceAngle:0,
    state:'idle',
    tailAngle:0,
    blink:0,
    energy:80,
    hunger:30,
    affection:20
};

let mouse={x:canvas.width/2,y:canvas.height/2};
document.addEventListener('mousemove',e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

// 远近缩放
function getScale(y){
    const t=Math.max(0,Math.min(1,(y-100)/(canvas.height-200)));
    return 0.5+t*0.9;
}

// 绘制猫
function drawCat(){
    const x=cat.x;
    const y=cat.y;
    const s=getScale(y);
    
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s,s);
    ctx.rotate(cat.faceAngle*0.3);
    
    // 尾巴
    ctx.save();
    ctx.translate(-40,10);
    ctx.rotate(Math.sin(cat.tailAngle)*0.4+0.3);
    ctx.fillStyle='#0a0a0a';
    ctx.beginPath();
    ctx.ellipse(-25,0,30,10,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    
    // 后腿
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.ellipse(-20,35,18,22,0,0,Math.PI*2);
    ctx.ellipse(20,35,18,22,0,0,Math.PI*2);
    ctx.fill();
    
    // 身体
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.ellipse(0,15,42,32,0,0,Math.PI*2);
    ctx.fill();
    
    // 前腿
    ctx.beginPath();
    ctx.ellipse(-15,40,14,20,0,0,Math.PI*2);
    ctx.ellipse(15,40,14,20,0,0,Math.PI*2);
    ctx.fill();
    
    // 爪子
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(-15,52,10,5,0,0,Math.PI*2);
    ctx.ellipse(15,52,10,5,0,0,Math.PI*2);
    ctx.fill();
    
    // 头部（圆脸）
    ctx.fillStyle='#111';
    ctx.beginPath();
    ctx.arc(0,-25,32,0,Math.PI*2);
    ctx.fill();
    
    // 耳朵
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.moveTo(-22,-45);ctx.lineTo(-28,-70);ctx.lineTo(-8,-50);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(22,-45);ctx.lineTo(28,-70);ctx.lineTo(8,-50);ctx.closePath();ctx.fill();
    
    // 内耳
    ctx.fillStyle='#443';
    ctx.beginPath();ctx.moveTo(-20,-48);ctx.lineTo(-24,-62);ctx.lineTo(-12,-52);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(20,-48);ctx.lineTo(24,-62);ctx.lineTo(12,-52);ctx.closePath();ctx.fill();
    
    // ===== 大眼睛（参考图颜色：金黄色/琥珀色）=====
    if(cat.blink<0.1){
        // 眼白 - 金黄色琥珀色
        ctx.fillStyle='#d4a520'; // 金黄色
        ctx.shadowColor='#b89410';
        ctx.shadowBlur=3;
        
        // 大眼
        ctx.beginPath();ctx.arc(-12,-28,11,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(12,-28,11,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        
        // 瞳孔（黑色椭圆，像参考图）
        ctx.fillStyle='#000';
        ctx.beginPath();ctx.ellipse(-12,-28,3.5,7,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(12,-28,3.5,7,0,0,Math.PI*2);ctx.fill();
        
        // 高光（让眼睛亮）
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(-9,-32,3.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(15,-32,3.5,0,Math.PI*2);ctx.fill();
        
        // 小高光
        ctx.beginPath();ctx.arc(-14,-25,1.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(10,-25,1.5,0,Math.PI*2);ctx.fill();
    }else{
        ctx.strokeStyle='#000';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(-12,-28,8,0.2,Math.PI-0.2);ctx.stroke();
        ctx.beginPath();ctx.arc(12,-28,8,0.2,Math.PI-0.2);ctx.stroke();
    }
    
    // 鼻子
    ctx.fillStyle='#ff9999';
    ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(-4,-12);ctx.lineTo(4,-12);ctx.closePath();ctx.fill();
    
    // 嘴巴
    ctx.strokeStyle='#333';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(0,-8);
    ctx.moveTo(0,-8);ctx.quadraticCurveTo(-5,-5,-8,-8);
    ctx.moveTo(0,-8);ctx.quadraticCurveTo(5,-5,8,-8);
    ctx.stroke();
    
    // 胡须
    ctx.strokeStyle='#222';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-25,-20);ctx.lineTo(-48,-22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-25,-15);ctx.lineTo(-48,-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(25,-20);ctx.lineTo(48,-22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(25,-15);ctx.lineTo(48,-12);ctx.stroke();
    
    ctx.restore();
}

let time=0;
let targetX=canvas.width/2,targetY=canvas.height*0.6;

function update(){
    time+=0.05;
    cat.tailAngle+=0.12;
    
    if(Math.random()<0.015)cat.blink=1;
    if(cat.blink>0)cat.blink-=0.08;
    
    if(Math.random()<0.008){
        targetX=80+Math.random()*(canvas.width-160);
        targetY=canvas.height*0.25+Math.random()*(canvas.height*0.6);
        cat.state='walk';
    }
    
    if(Math.random()<0.005){
        targetX=mouse.x;
        targetY=mouse.y;
        cat.state='chase';
    }
    
    const dx=targetX-cat.x;
    const dy=targetY-cat.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    
    if(dist>5){
        const speed=cat.state==='chase'?4:2;
        cat.vx+=(dx/dist*speed-cat.vx)*0.08;
        cat.vy+=(dy/dist*speed-cat.vy)*0.08;
        cat.x+=cat.vx;
        cat.y+=cat.vy;
        cat.faceAngle=Math.atan2(cat.vy,cat.vx);
    }else{
        cat.vx*=0.9;cat.vy*=0.9;
        cat.state='idle';
        cat.faceAngle*=0.95;
    }
    
    cat.x=Math.max(60,Math.min(canvas.width-60,cat.x));
    cat.y=Math.max(80,Math.min(canvas.height-100,cat.y));
    
    // 状态变化
    if(cat.state==='sleep'){
        cat.energy=Math.min(100,cat.energy+0.5);
    }else{
        cat.energy=Math.max(0,cat.energy-0.1);
        cat.hunger=Math.min(100,cat.hunger+0.05);
    }
}

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    update();
    drawCat();
    requestAnimationFrame(loop);
}

loop();

// 接收来自托盘的消息
window.addEventListener('message',e=>{
    if(e.data.type==='rename'){
        catName=e.data.name;
        localStorage.setItem('catName',catName);
    }
});
</script>
</body>
</html>
